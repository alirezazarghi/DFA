name: 🔥 -- v2 دانلود قطعه‌قطعه و آپلود در Release 

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک مستقیم فایل'
        required: true
        type: string
      chunk_size:
        description: 'اندازه هر قطعه (مگابایت، حداکثر 1900)'
        required: true
        default: '1900'
        type: string
      tag:
        description: 'نام Release (مثلاً v1.0 یا file-parts)'
        required: true
        default: 'file-parts'
        type: string
      part:
        description: 'شماره پارت خاص (از ۰ شروع می‌شود، خالی = همه)'
        required: false
        type: string

jobs:
  chunked-upload:
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: بررسی ورودی‌ها
        run: |
          CHUNK_SIZE_MB=${{ github.event.inputs.chunk_size }}
          if [ "$CHUNK_SIZE_MB" -gt 1900 ]; then
            echo "حداکثر اندازه قطعه 1900 مگابایت است (محدودیت GitHub Release)"
            exit 1
          fi

      - name: دریافت حجم فایل
        id: filesize
        run: |
          URL="${{ github.event.inputs.url }}"
          SIZE=$(curl -sI -L "$URL" | grep -i content-length | tail -1 | awk '{print $2}' | tr -d '\r')
          if [ -z "$SIZE" ]; then
            echo "خطا: نتوانستم حجم فایل را تشخیص دهم"
            exit 1
          fi
          echo "total_size=$SIZE" >> $GITHUB_OUTPUT
          echo "حجم کل فایل: $(( SIZE / 1024 / 1024 )) مگابایت"

      - name: محاسبه حجم به مگابایت
        id: calc_mb
        run: |
          MB=$(( ${{ steps.filesize.outputs.total_size }} / 1024 / 1024 ))
          echo "size_mb=$MB" >> $GITHUB_OUTPUT

      - name: ایجاد Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: "بخش‌های فایل ${{ github.event.inputs.tag }}"
          body: "قطعات فایل *${{ github.event.inputs.url }} (${{ steps.calc_mb.outputs.size_mb }} مگابایت)"
          draft: false
          prerelease: false

      - name: دانلود و آپلود قطعات
        run: |
          URL="${{ github.event.inputs.url }}"
          TOTAL_SIZE=${{ steps.filesize.outputs.total_size }}
          CHUNK_SIZE_MB=${{ github.event.inputs.chunk_size }}
          CHUNK_SIZE=$(( CHUNK_SIZE_MB * 1024 * 1024 ))
          NUM_CHUNKS=$(( (TOTAL_SIZE + CHUNK_SIZE - 1) / CHUNK_SIZE ))

          # مدیریت ورودی part
          PART_INPUT="${{ github.event.inputs.part }}"
          if [ -n "$PART_INPUT" ] && [ "$PART_INPUT" != "all" ]; then
            # فقط یک پارت خاص
            SELECTED_PART=$(( PART_INPUT ))
            if [ "$SELECTED_PART" -lt 0 ] || [ "$SELECTED_PART" -ge "$NUM_CHUNKS" ]; then
              echo "خطا: شماره پارت $SELECTED_PART خارج از محدوده (0 تا $((NUM_CHUNKS-1))) است."
              exit 1
            fi
            START_INDEX=$SELECTED_PART
            END_INDEX=$SELECTED_PART
          else
            START_INDEX=0
            END_INDEX=$(( NUM_CHUNKS - 1 ))
          fi

          echo "تعداد کل قطعات: $NUM_CHUNKS"
          echo "قطعات انتخاب‌شده: $START_INDEX تا $END_INDEX"

          RELEASE_TAG="${{ github.event.inputs.tag }}"
          REPO="${{ github.repository }}"

          for (( i=START_INDEX; i<=END_INDEX; i++ )); do
            START=$(( i  CHUNK_SIZE ))
            END=$(( START + CHUNK_SIZE - 1 ))
            if [ $END -ge $TOTAL_SIZE ]; then
              END=$(( TOTAL_SIZE - 1 ))
          fi

            FILENAME="part_$(printf "%04d" $i)"
            EXPECTED_SIZE=$(( END - START + 1 ))
            echo "دانلود قطعه $((i+1))/$NUM_CHUNKS (${EXPECTED_SIZE} بایت)..."

            # دانلود با curl و دریافت کد HTTP
            HTTP_CODE=$(curl -L --retry 5 --retry-delay 10 \
              -H "Range: bytes=$START-$END" \
              -o "$FILENAME" \
              -w "%{http_code}" \
              "$URL")

            echo "کد HTTP: $HTTP_CODE"

            # بررسی کد HTTP
            if [ "$HTTP_CODE" != "206" ] && [ "$HTTP_CODE" != "200" ]; then
              echo "خطا: کد HTTP غیرمنتظره $HTTP_CODE"
              exit 1
            fi

            # برای قطعه غیرآخر حتماً باید 206 دریافت کنیم
            if [ $i -ne $(( NUM_CHUNKS - 1 )) ] && [ "$HTTP_CODE" != "206" ]; then
              echo "خطا: سرور از درخواست Range پشتیبانی نمی‌کند (کد غیر 206 برای قطعه غیر آخر)"
              exit 1
            fi

            # بررسی اندازه فایل دانلودشده
            ACTUAL_SIZE=$(stat -c%s "$FILENAME")
            if [ $ACTUAL_SIZE -ne $EXPECTED_SIZE ]; then
              # فقط برای قطعه آخر ممکن است اندازه کمتر باشد (اگر سرور 200 بدهد و کل فایل را برگرداند)
              if [ $i -ne $(( NUM_CHUNKS - 1 )) ] || [ "$HTTP_CODE" != "200" ]; then
                echo "خطا: اندازه فایل دانلودشده ($ACTUAL_SIZE بایت) با مقدار درخواستی ($EXPECTED_SIZE بایت) مطابقت ندارد."
                exit 1
              else
                echo "توجه: سرور کل فایل را برگردانده (200). اندازه واقعی: $ACTUAL_SIZE بایت"
              fi
            fi

            # آپلود قطعه به Release
            echo "آپلود قطعه به GitHub Release..."
            gh release upload "$RELEASE_TAG" "$FILENAME" --repo "$REPO" --clobber

            # حذف فایل محلی
            rm -f "$FILENAME"
            echo "قطعه $((i+1)) با موفقیت آپلود و پاک شد."
          done
